services:
  flashnode-ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.aarch64
    container_name: flashnode-ai
    privileged: true
    network_mode: host
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - GPIO_BACKEND=libgpiod

    volumes:
      # Hardware passthrough — GPIO chips (RK3588S2 has gpiochip0-4)
      - /dev/bus/usb:/dev/bus/usb
      - /dev/gpiochip0:/dev/gpiochip0
      - /dev/gpiochip1:/dev/gpiochip1
      - /dev/gpiochip2:/dev/gpiochip2
      - /dev/gpiochip3:/dev/gpiochip3
      - /dev/gpiochip4:/dev/gpiochip4
      - /run/udev:/run/udev:ro

      # Serial ports — dynamically mapped
      # Docker --device would be better but compose doesn't support wildcards
      # privileged: true gives access to all /dev/ttyUSB* and /dev/ttyACM*

      # Persistent data
      - ./vault:/opt/flashnode/vault
      - ./data:/opt/flashnode/data
      - ./config:/opt/flashnode/config

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
