# Custom OpenOCD configuration for RP2040 via Raspberry Pi Debug Probe
# FlashNode-AI — Rock 5C / Armbian
#
# Usage:
#   openocd -f interface/cmsis-dap.cfg -f config/openocd/rp2040_custom.cfg
#
# Or via FlashNode-AI API:
#   POST /api/v1/action/flash { "tool": "openocd", "target": "RP2040", ... }

source [find target/rp2040.cfg]

# Adapter speed optimized for CMSIS-DAP on Rock 5C USB
adapter speed 5000

# RP2040 has two cores — configure both
$_TARGETNAME_0 configure -event reset-init {
    # After reset, set clock to default
}

$_TARGETNAME_1 configure -event reset-init {
    # Core 1 init
}

# Flash programming settings
# RP2040 uses XIP flash — flash write_image and verify_image work via SWD
reset_config srst_nogate

# Log level (0=error, 1=warning, 2=info, 3=debug)
debug_level 2
